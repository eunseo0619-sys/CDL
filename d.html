<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고려대 CDL 인수인계 AI 선배</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --ku-crimson: #8b1a1a; --bg: #f5f5f7; }
        body { background-color: var(--bg); font-family: 'Noto Sans KR', sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; }
        #root { width: 100%; max-width: 600px; display: flex; flex-direction: column; background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 14.5px; line-height: 1.6; white-space: pre-wrap; }
        .bot { align-self: flex-start; background: #f0f0f0; border-top-left-radius: 2px; color: #333; }
        .user { align-self: flex-end; background: var(--ku-crimson); color: white; border-top-right-radius: 2px; }
        .input-area { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; background: #fff; }
        textarea { flex: 1; border: 1px solid #ddd; padding: 12px; border-radius: 10px; outline: none; resize: none; font-family: inherit; height: 44px; }
        button { background: var(--ku-crimson); border: none; color: white; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .warning { font-size: 11px; color: #888; border-top: 1px dashed #ccc; padding-top: 8px; margin-top: 10px; display: block; }
        .loading { font-size: 13px; color: #8b1a1a; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // 1. 여기에 발급받은 API 키를 넣으세요
        const API_KEY = "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";

        // 2. 기본 도서관 정보 (제공해주신 데이터)
        const BASE_LIBRARY_INFO = `
        === 학술정보관(CDL) 기본 정보 ===
        - 위치: 개교 100주년 기념 삼성관 내 / 개관: 2005년 5월
        - 특징: 인포메이션 커먼스(IC), 멀티미디어 특화, 영상자료 4만점 소장
        - 문의: 02-3290-2782 (2층 데스크) / 02-3290-1506 (지하 1층)
        - 이용: 학생증 필수, 방학 토요일 개관, 열람실 연중 개방
        (이하 층별 시설/대출규정/예약방법 생략 - 아래 전체 데이터 포함됨)
        `;

        // 3. ★ 여기에 워드 파일 내용을 통째로 복사해서 붙여넣으세요 ★
        const HANDOVER_DATA = `
        (여기에 인수인계 워드 파일 내용을 붙여넣으시면 됩니다)
        `;

        const SYSTEM_PROMPT = `
        당신은 고려대학교 학술정보관(CDL) 근로장학생을 위한 AI 어시스턴트(선배)입니다.
        아래 [도서관 정보]와 [인수인계 매뉴얼]을 바탕으로 후배의 질문에 정확하고 친절하게 답변하세요.

        [지침]
        1. 말투: 부드럽고 다정한 선배 말투(~해요, ~해봐요, ~예요)를 사용하세요.
        2. 추론: 매뉴얼에 명시된 규칙을 바탕으로 질문자의 상황에 맞춰 똑똑하게 판단해서 답하세요.
        3. 근거 확인: 매뉴얼에 근거 규정이 전혀 없는 경우, 억측하지 말고 반드시 "해당 내용에 대한 규정은 매뉴얼에 없어요"라고 답변하세요.
        4. 모르는 내용: "도서관 홈페이지(library.korea.ac.kr)에서 확인하거나 담당 직원에게 문의하세요"라고 안내하세요.
        5. 언어: 한국어로만 답변하고, 아주 간결하고 명확하게 핵심만 전달하세요.

        [도서관 정보 & 매뉴얼 데이터]
        ${BASE_LIBRARY_INFO}
        ${HANDOVER_DATA}
        `;

        function App() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState("");
            const [loading, setLoading] = useState(false);
            const scrollRef = useRef();

            useEffect(() => { scrollRef.current?.scrollTo(0, scrollRef.current.scrollHeight); }, [messages]);

            const sendMessage = async () => {
                if (!input.trim() || loading) return;
                const userText = input;
                setInput("");
                setMessages(prev => [...prev, { role: "user", content: userText }]);
                setLoading(true);

                try {
                    const response = await fetch("https://api.anthropic.com/v1/messages", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "x-api-key": API_KEY,
                            "anthropic-version": "2023-06-01",
                            "dangerously-allow-tlsv1.1": "true"
                        },
                        body: JSON.stringify({
                            model: "claude-3-haiku-20240307",
                            max_tokens: 1000,
                            system: SYSTEM_PROMPT,
                            messages: [{ role: "user", content: userText }]
                        })
                    });

                    const resData = await response.json();
                    const botReply = resData.content[0].text;
                    setMessages(prev => [...prev, { role: "assistant", content: botReply }]);
                } catch (err) {
                    setMessages(prev => [...prev, { role: "assistant", content: "앗, API 연결에 문제가 생겼어! 키가 잘 입력됐는지 확인해봐." }]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div style={{display:'flex', flexDirection:'column', height:'100%'}}>
                    <header style={{padding:'15px 20px', borderBottom:'2px solid var(--ku-crimson)', background:'#fff'}}>
                        <h1 style={{fontSize:'18px', color:'var(--ku-crimson)', margin:0}}>🦁 CDL 인수인계 AI 선배</h1>
                    </header>
                    <div className="chat-window" ref={scrollRef}>
                        <div className="msg bot">
                            안녕! CDL 인수인계 내용을 다 기억하고 있는 어시스턴트야. 궁금한 게 있으면 편하게 물어봐! 딱 필요한 내용만 쏙쏙 골라 알려줄게. 😊
                            <span className="warning">⚠️ ai는 실수를 하거나, 매뉴얼 업데이트가 되지 않았을 수 있습니다. 중요한 내용은 더블체크 해주세요.</span>
                        </div>
                        {messages.map((m, i) => (
                            <div key={i} className={`msg ${m.role === 'user' ? 'user' : 'bot'}`}>{m.content}</div>
                        ))}
                        {loading && <div className="loading">선배가 확인 중... 💬</div>}
                    </div>
                    <div className="input-area">
                        <textarea 
                            value={input} 
                            onChange={e => setInput(e.target.value)} 
                            onKeyPress={e => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }}}
                            placeholder="무엇이든 물어봐요!"
                        />
                        <button onClick={sendMessage}>전송</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
