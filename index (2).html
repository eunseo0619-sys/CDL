<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고려대 CDL 도서관 안내 시스템</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ku-crimson: #8b1a1a;
            --ku-bright-red: #c0392b;
            --bg-dark: #0d0d0e;
            --card-bg: #181819;
            --border: #252527;
            --text: #f0f0f0;
            --text-dim: #aaa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-dark); 
            font-family: 'Noto Sans KR', sans-serif; 
            color: var(--text);
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .container {
            width: 100%;
            maxWidth: 600px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        /* Header */
        header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--ku-crimson), var(--ku-bright-red));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        /* Chat Window */
        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .bot {
            align-self: flex-start;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-bottom-left-radius: 2px;
        }
        .user {
            align-self: flex-end;
            background: var(--ku-crimson);
            border-bottom-right-radius: 2px;
        }

        /* Quick Menu */
        .quick-menu {
            padding: 10px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .quick-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .quick-btn:hover {
            border-color: var(--ku-bright-red);
            color: white;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 25px;
            color: white;
            outline: none;
        }
        button#send-btn {
            width: 45px;
            height: 45px;
            background: var(--ku-crimson);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">📚</div>
        <div>
            <h1 style="font-size: 17px;">고려대 CDL 가이드</h1>
            <p style="font-size: 11px; color: var(--text-dim);">학술정보관 이용 안내 (오프라인 모드)</p>
        </div>
    </header>

    <div id="chat-window">
        <div class="message bot">안녕하세요! 고려대학교 학술정보관(CDL) 근로장학생 AI 어시스턴트입니다. 

도서관 시설, 대출 규정, 예약 방법 등 궁금한 점을 아래 메뉴에서 선택하거나 입력해 주세요!</div>
    </div>

    <div class="quick-menu" id="quick-menu">
        <button class="quick-btn" onclick="ask('층별 시설 안내')">🏢 층별 시설 안내</button>
        <button class="quick-btn" onclick="ask('대출/반납 규정')">📖 대출/반납 규정</button>
        <button class="quick-btn" onclick="ask('스터디룸 예약')">📅 예약 방법</button>
        <button class="quick-btn" onclick="ask('지하 1층 국제기구')">🌍 국제기구자료실</button>
        <button class="quick-btn" onclick="ask('이용 시간')">⏰ 이용 시간</button>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="질문을 입력하세요..." onkeypress="if(event.keyCode==13) send()">
        <button id="send-btn" onclick="send()">↑</button>
    </div>
</div>

<script>
    // 제공해주신 텍스트 데이터를 기반으로 한 지식 베이스
    const libraryData = {
        "기본": "학술정보관(CDL)은 삼성관 내 위치하며 2005년 개관했습니다. 국내 최초 인포메이션 커먼스(IC) 기반으로 멀티미디어 이용이 가능합니다. 문의: 02-3290-2782",
        "층별": `[4층] 대열람실(좌석 1,013석), 그룹스터디룸
[3층] 화상회의실(12명 수용)
[2층] 멀티미디어열람실, Theater, 그룹프레젠테이션룸, 그룹스터디룸, Carrel
[1층] C-Lounge, D-Lounge, Sleeping Zone, L-Lounge
[지하1층] 국제기구자료실, 보존서고, 학위논문`,
        "대출": `■ 대출 규정:
- 학부생: 30책, 15일 (연장 3회)
- 대학원생: 60책, 30일 (연장 3회)
- 교원: 90책, 90일 (연장 3회)
연체 시 연체일수만큼 대출이 중지됩니다.`,
        "예약": "시설 예약은 도서관 홈페이지(library.korea.ac.kr) 또는 모바일 앱(KLIB)에서 가능합니다. 사용일 2주 전부터 예약할 수 있습니다.",
        "시간": "평일 09:00~22:00, 토요일 09:00~15:00 운영합니다. 방학 중에는 평일 19:00, 토요일 13:00까지 단축 운영됩니다. (1층 라운지 06:00~23:00 연중개방)",
        "국제기구": "지하 1층 국제기구자료실은 UN, EU, OECD 자료와 학위논문(약 29만권)을 소장하고 있습니다. 문의: 02-3290-1506"
    };

    const chatWindow = document.getElementById('chat-window');

    function addMessage(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        msgDiv.innerText = text;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function ask(type) {
        addMessage('user', type);
        
        let response = "";
        if(type.includes("시설") || type.includes("층")) response = libraryData.층별;
        else if(type.includes("대출") || type.includes("반납")) response = libraryData.대출;
        else if(type.includes("예약")) response = libraryData.예약;
        else if(type.includes("시간") || type.includes("방학")) response = libraryData.시간;
        else if(type.includes("국제") || type.includes("지하")) response = libraryData.국제기구;
        else response = libraryData.기본 + "\n\n더 자세한 사항은 도서관 홈페이지를 참조해 주세요.";

        setTimeout(() => addMessage('bot', response), 300);
    }

    function send() {
        const input = document.getElementById('user-input');
        if(!input.value.trim()) return;
        
        const query = input.value;
        addMessage('user', query);
        
        // 간단한 키워드 매칭 로직
        let botReply = "죄송합니다. 해당 질문에 대한 정보를 찾지 못했습니다. 도서관 홈페이지(library.korea.ac.kr)에서 확인하거나 담당 직원에게 문의하세요.";
        
        if(query.includes("층") || query.includes("시설")) botReply = libraryData.층별;
        else if(query.includes("대출") || query.includes("책")) botReply = libraryData.대출;
        else if(query.includes("예약")) botReply = libraryData.예약;
        else if(query.includes("시간") || query.includes("언제")) botReply = libraryData.시간;
        else if(query.includes("지하") || query.includes("국제")) botReply = libraryData.국제기구;
        
        setTimeout(() => addMessage('bot', botReply), 400);
        input.value = "";
    }
</script>

</body>
</html>
