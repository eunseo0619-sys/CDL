<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDL 인수인계 AI 선배</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --ku-crimson: #8b1a1a; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f0f2; display: flex; justify-content: center; height: 100vh; }
        #root { width: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; height: 100%; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header { background: var(--ku-crimson); color: white; padding: 15px; font-weight: bold; text-align: center; font-size: 1.1rem; }
        .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #fafafa; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 85%; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; }
        .bot { align-self: flex-start; background: #e9e9eb; color: #1a1a1a; border-bottom-left-radius: 2px; }
        .user { align-self: flex-end; background: var(--ku-crimson); color: white; border-bottom-right-radius: 2px; }
        .input-box { border-top: 1px solid #eee; padding: 15px; display: flex; gap: 8px; background: white; }
        textarea { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 10px; resize: none; height: 44px; font-family: inherit; font-size: 14px; outline: none; }
        button { background: var(--ku-crimson); color: white; border: none; padding: 0 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.5; }
        .loading { font-size: 12px; color: #888; margin-left: 5px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const HANDOVER_DATA = `
        === 학술정보관(CDL) 기본 정보 ===
        - 위치: 개교 100주년 기념 삼성관 내
        - 개관: 2005년 5월
        - 특징: 국내 최초 인포메이션 커먼스(IC) 개념 기반, 멀티미디어 자료 이용 가능
        - 소장자료: DVD, 필름 등 영상자료 40,000여 점
        - 문의전화: 02-3290-2782 (2층 멀티미디어열람실 데스크)
        - 자료실은 방학 중 토요일도 개관, 열람실은 연중 개방
        - 이용 시 학생증 지참 필수

        === CDL 층별 시설 안내 ===
        [4층] 대열람실, 그룹스터디룸(4인/6인/8인)
        [3층] 화상회의실(학술교류/교환학생 소통)
        [2층] 멀티미디어열람실, Theater(영상관람), 그룹프레젠테이션룸, 그룹스터디룸, Carrel(1인실)
        [1층] C-Lounge, D-Lounge(집중학습/노트북석), L-Lounge(다목적/휴게), Sleeping Zone
        [지하 1층] 국제기구자료실(UN/EU/OECD), 학위논문, 보존서고, 교양잡지/신문

        === 대출/반납 규정 ===
        - 학부생: 30책, 15일 (연장 15일씩 3회)
        - 대학원생: 60책, 30일 (연장 30일씩 3회)
        - 연체 시: 연체일수만큼 대출 중지 (30일 이상 연체 시 시설 이용 전면 중지)
        - 반납: 자동반납기, 데스크 직접 반납, 택배 반납 가능

        === 시설 예약 방법 ===
        - 도서관 홈페이지 또는 KLIB 모바일 앱 이용
        - 2층 Theater/그룹프레젠테이션룸은 관리자 승인 필요 (1~2일 소요)
        `;

        const SYSTEM_PROMPT = `당신은 고려대학교 학술정보관(CDL) 근로장학생 AI 선배입니다.
        제공된 [인수인계 데이터]를 바탕으로 답변하세요. 
        규정이 없는 내용은 "매뉴얼에 관련 규정이 없어요"라고 답하고, 말투는 친절하게 하세요.

        [인수인계 데이터]
        ${HANDOVER_DATA}`;

        function App() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState("");
            const [isTyping, setIsTyping] = useState(false);
            const chatRef = useRef();

            useEffect(() => {
                if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
            }, [messages, isTyping]);

            const handleSend = async () => {
                if (!input.trim() || isTyping) return;
                const userMsg = input;
                setInput("");
                setMessages(prev => [...prev, { role: "user", content: userMsg }]);
                setIsTyping(true);

                try {
                    const res = await fetch("/api/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ systemPrompt: SYSTEM_PROMPT, messages: [{ role: "user", content: userMsg }] })
                    });
                    const data = await res.json();
                    if (data?.content?.[0]?.text) {
                        setMessages(prev => [...prev, { role: "assistant", content: data.content[0].text }]);
                    } else {
                        throw new Error();
                    }
                } catch (err) {
                    setMessages(prev => [...prev, { role: "assistant", content: "앗, 오류가 발생했어. 다시 시도해줄래?" }]);
                } finally {
                    setIsTyping(false);
                }
            };

            return (
                <div style={{display:'flex', flexDirection:'column', height:'100%'}}>
                    <div className="header">🦁 CDL 인수인계 AI 선배</div>
                    <div className="chat-container" ref={chatRef}>
                        <div className="msg bot">안녕! CDL 규정이나 시설에 대해 궁금한 게 있으면 물어봐. 😊</div>
                        {messages.map((msg, i) => (
                            <div key={i} className={`msg ${msg.role === 'user' ? 'user' : 'bot'}`}>{msg.content}</div>
                        ))}
                        {isTyping && <div className="loading">생각 중... 💬</div>}
                    </div>
                    <div className="input-box">
                        <textarea value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); handleSend(); }}} placeholder="질문을 입력하세요..." />
                        <button onClick={handleSend} disabled={isTyping || !input.trim()}>전송</button>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
