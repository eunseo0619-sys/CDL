<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고려대 CDL 인수인계 AI 선배</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --ku-crimson: #8b1a1a; --bg: #f5f5f7; }
        body { background-color: var(--bg); font-family: 'Noto Sans KR', sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; }
        #root { width: 100%; max-width: 600px; display: flex; flex-direction: column; background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 14.5px; line-height: 1.6; white-space: pre-wrap; }
        .bot { align-self: flex-start; background: #f0f0f0; border-top-left-radius: 2px; color: #333; }
        .user { align-self: flex-end; background: var(--ku-crimson); color: white; border-top-right-radius: 2px; }
        .input-area { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; background: #fff; }
        textarea { flex: 1; border: 1px solid #ddd; padding: 12px; border-radius: 10px; outline: none; resize: none; font-family: inherit; height: 44px; }
        button { background: var(--ku-crimson); border: none; color: white; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .warning { font-size: 11px; color: #888; border-top: 1px dashed #ccc; padding-top: 8px; margin-top: 10px; display: block; }
        .loading { font-size: 13px; color: #8b1a1a; font-weight: bold; padding: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // ==========================================================
        // ★ [여기에 인수인계 워드 파일 내용을 통째로 복사해서 붙여넣으세요] ★
        // ==========================================================
        const HANDOVER_DATA = `
        여기에 나중에 워드 파일 내용을 붙여넣으시면 됩니다. 
        백틱(`) 기호는 지우지 마세요.
        `;

        const BASE_LIBRARY_INFO = `
        당신은 고려대학교 학술정보관(CDL) 근로장학생을 위한 AI 어시스턴트(선배)입니다.
        제공된 정보를 바탕으로 질문에 정확하고 친절하게 답변하세요.
        
        [답변 원칙]
        1. 말투: 부드러운 선배 말투(~해요, ~해봐요)를 사용하세요.
        2. 근거: 매뉴얼에 근거 규정이 없다면 반드시 "해당 내용에 대한 근거 규정이 매뉴얼에 없어요"라고 답하세요.
        3. 모르는 내용: "도서관 홈페이지(library.korea.ac.kr)에서 확인하거나 담당 직원에게 문의하세요"라고 안내하세요.
        4. 간결성: 핵심 위주로 명확하게 답변하세요.

        === 학술정보관(CDL) 기본 데이터 ===
        - 위치: 개교 100주년 기념 삼성관 내
        - 문의: 02-3290-2782 (2층), 02-3290-1506 (지하1층)
        - 특징: 인포메이션 커먼스(IC), 영상자료 4만여 점 소장
        - 시설: 1층(C/D/L 라운지), 2층(멀티미디어열람실, Theater, 프레젠테이션룸), 3층(화상회의실), 4층(대열람실, 스터디룸)
        - 규정: 학부생(30책/15일), 대학원생(60책/30일), 연장 3회 가능. 연체 시 연체일수만큼 대출 중지.
        
        [추가 인수인계 매뉴얼 데이터]
        ${HANDOVER_DATA}
        `;

        function App() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState("");
            const [loading, setLoading] = useState(false);
            const scrollRef = useRef();

            useEffect(() => { scrollRef.current?.scrollTo(0, scrollRef.current.scrollHeight); }, [messages]);

            const sendMessage = async () => {
                if (!input.trim() || loading) return;
                const userText = input;
                setInput("");
                setMessages(prev => [...prev, { role: "user", content: userText }]);
                setLoading(true);

                try {
                    const response = await fetch("/api/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            systemPrompt: BASE_LIBRARY_INFO,
                            messages: [{ role: "user", content: userText }]
                        })
                    });

                    const resData = await response.json();
                    if (!response.ok) throw new Error();

                    const botReply = resData.content[0].text;
                    setMessages(prev => [...prev, { role: "assistant", content: botReply }]);
                } catch (err) {
                    setMessages(prev => [...prev, { role: "assistant", content: "앗, 서버와 통신 중에 문제가 발생했어요. Vercel 환경변수나 설정을 다시 확인해볼래?" }]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div style={{display:'flex', flexDirection:'column', height:'100%'}}>
                    <header style={{padding:'15px 20px', borderBottom:'2px solid var(--ku-crimson)', background:'#fff'}}>
                        <h1 style={{fontSize:'18px', color:'var(--ku-crimson)', margin:0}}>🦁 CDL 인수인계 AI 선배</h1>
                    </header>
                    <div className="chat-window" ref={scrollRef}>
                        <div className="msg bot">
                            안녕! CDL 인수인계 내용을 기억하고 있는 어시스턴트야. 궁금한 게 있으면 편하게 물어봐! 딱 필요한 내용만 쏙쏙 골라 알려줄게. 😊
                            <span className="warning">⚠️ ai는 실수를 할 수 있습니다. 중요한 내용은 반드시 직원분께 확인하거나 매뉴얼을 더블체크 해주세요.</span>
                        </div>
                        {messages.map((m, i) => (
                            <div key={i} className={`msg ${m.role === 'user' ? 'user' : 'bot'}`}>{m.content}</div>
                        ))}
                        {loading && <div className="loading">선배가 확인 중... 💬</div>}
                    </div>
                    <div className="input-area">
                        <textarea 
                            value={input} 
                            onChange={e => setInput(e.target.value)} 
                            onKeyPress={e => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }}}
                            placeholder="무엇이든 물어봐요!" 
                        />
                        <button onClick={sendMessage}>전송</button>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
